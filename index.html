<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AutoFlow — Control Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#e8e0d4;-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}
button:focus,input:focus,textarea:focus,select:focus{outline:none}
input::placeholder,textarea::placeholder{color:#484038}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:rgba(200,180,150,.1)}
::-webkit-scrollbar-thumb{background:rgba(180,150,110,.3);border-radius:3px}
select{appearance:none}

/* ── GLASS & NEO ── */
.glass{background:rgba(10,10,10,.52);backdrop-filter:blur(28px) saturate(1.8);-webkit-backdrop-filter:blur(28px) saturate(1.8);border:1px solid rgba(255,255,255,.1);box-shadow:0 8px 48px rgba(0,0,0,.7),0 1.5px 0 rgba(255,255,255,.1) inset}
.glass-sm{background:rgba(15,15,15,.48);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 24px rgba(0,0,0,.5)}
.neo{background:rgba(18,18,18,.82);box-shadow:6px 6px 18px rgba(0,0,0,.6),-4px -4px 12px rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.neo-in{background:rgba(14,14,14,.88);box-shadow:inset 4px 4px 10px rgba(0,0,0,.55),inset -3px -3px 8px rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden;position:relative;z:1}
#bg{position:fixed;inset:0;z-index:0;background:#080808;pointer-events:none}
#bg .blob{position:absolute;border-radius:50%;pointer-events:none}

/* ── SIDEBAR ── */
#sidebar{width:220px;flex-shrink:0;display:flex;flex-direction:column;height:100vh;position:sticky;top:0;z-index:10;background:rgba(8,8,8,.5);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-right:1px solid rgba(255,255,255,.08);box-shadow:0 8px 48px rgba(0,0,0,.6)}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:#e8e2d8;letter-spacing:.03em}
.logo-sub{font-size:8px;color:#585048;letter-spacing:.14em;text-transform:uppercase}
.sidebar-nav{flex:1;padding:14px 12px;overflow-y:auto}
.nav-group-label{font-size:8px;color:#404040;letter-spacing:.12em;text-transform:uppercase;padding:4px 8px 8px;display:block}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;padding:9px 12px;border-radius:14px;border:none;background:transparent;color:#888070;font-size:13px;font-weight:400;text-align:left;margin-bottom:2px;transition:all .2s;position:relative}
.nav-item:hover{background:rgba(255,255,255,.06);color:#d0c8be}
.nav-item.active{background:rgba(255,255,255,.07);box-shadow:inset 3px 3px 8px rgba(0,0,0,.4),inset -3px -3px 8px rgba(255,255,255,.04);color:#f0e8dc;font-weight:600;border:1px solid rgba(255,255,255,.1)}
.nav-item.active .nav-dot{display:block}
.nav-dot{display:none;width:6px;height:6px;border-radius:50%;background:#9a8060;margin-left:auto}
.nav-icon{font-size:14px;width:22px;text-align:center;opacity:.6}
.nav-item.active .nav-icon{opacity:1}
.sidebar-footer{padding:12px 14px 16px;border-top:1px solid rgba(255,255,255,.07)}
.activity-mini{margin-bottom:10px}
.activity-mini-label{font-size:8px;color:#404040;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;display:block}
.activity-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.activity-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.activity-text{font-size:10px;color:#888070;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.activity-time{font-size:9px;color:#585048;font-family:'DM Mono',monospace;flex-shrink:0}
.status-pill{border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#7a9c78;box-shadow:0 0 6px rgba(100,140,90,.4);animation:pulse 2.5s infinite;flex-shrink:0}
.status-label{font-size:11px;color:#b0a898;font-weight:500}
.status-uptime{font-size:9px;color:#585048;font-family:'DM Mono',monospace}
.nav-group{margin-bottom:18px}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:40;background:rgba(8,8,8,.45);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:#e8e2d8;display:flex;align-items:center;gap:10px}
.topbar-slash{font-size:11px;color:#505048}
.topbar-right{display:flex;align-items:center;gap:8px}
.ws-btn{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.06);backdrop-filter:blur(14px);font-size:12px;color:#e8e2d8;font-weight:500}
.ws-avatar{width:22px;height:22px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;flex-shrink:0}
.ws-caret{font-size:8px;color:#505048}
.notif-btn{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;background:rgba(18,18,18,.82);box-shadow:6px 6px 14px rgba(180,150,110,.18),-4px -4px 10px rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.09);position:relative}
.notif-badge{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:#906050;border:2px solid rgba(15,15,15,.9)}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#7a6a50,#5a4a38);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#e0d8cc;box-shadow:0 4px 12px rgba(0,0,0,.5)}
.dropdown{position:absolute;top:calc(100% + 8px);right:0;border-radius:16px;min-width:210px;box-shadow:0 20px 60px rgba(0,0,0,.7);overflow:hidden;z-index:50;background:rgba(12,12,12,.88);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,.1)}
.dropdown-label{padding:10px 14px 6px;font-size:9px;color:#585048;letter-spacing:.1em;text-transform:uppercase;display:block}
.ws-option{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:transparent;border:none;cursor:pointer;text-align:left}
.ws-option:hover{background:rgba(255,255,255,.05)}
.ws-option.selected{background:rgba(255,255,255,.07)}
.ws-option-name{font-size:13px;color:#e0d8cc}
.ws-option-plan{font-size:10px;color:#505048}
.ws-check{color:#9a8060;font-size:13px;margin-left:auto}
.notif-item{padding:11px 16px;border-bottom:1px solid rgba(180,150,110,.07)}
.notif-item.unread{background:rgba(255,255,255,.04)}
.notif-msg{font-size:12px;color:#e8e2d8;margin-bottom:3px;line-height:1.4}
.notif-msg.read{color:#706860}
.notif-time{font-size:10px;color:#585048;font-family:'DM Mono',monospace}
.notif-header{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.07);font-size:12px;font-weight:600;color:#d0c8be}
.dropdown-pos{position:relative}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:24px 26px;background:transparent}
.page{animation:pageIn .35s ease both}

/* ── STAT CARD ── */
.stat-card{border-radius:20px;padding:20px 22px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent)}
.stat-label{font-size:10px;color:#888070;font-weight:600;letter-spacing:.09em;text-transform:uppercase}
.stat-value{font-size:28px;font-weight:700;color:#e8e2d8;font-family:'Cormorant Garamond',serif;letter-spacing:-.01em;line-height:1;margin:10px 0 6px}
.stat-sub{font-size:11px;color:#606058}
.stat-trend{font-size:10px;font-family:'DM Mono',monospace;font-weight:600}
.stat-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px}
.stat-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}

/* ── STATUS BADGE ── */
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 11px;font-size:11px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.02em;backdrop-filter:blur(4px);white-space:nowrap}
.badge.sm{padding:2px 8px;font-size:10px}
.badge-dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}
.badge.active,.badge.success{background:rgba(90,120,85,.18);color:#90b088;border:1px solid rgba(90,120,85,.4)}
.badge.inactive{background:rgba(160,150,140,.15);color:#808080;border:1px solid rgba(160,150,140,.3)}
.badge.running{background:rgba(80,110,160,.18);color:#8090b8;border:1px solid rgba(80,110,160,.4)}
.badge.failed{background:rgba(150,80,70,.18);color:#b07060;border:1px solid rgba(150,80,70,.4)}
.badge.active .badge-dot,.badge.success .badge-dot{background:#6a8860}
.badge.inactive .badge-dot{background:#8a7f74}
.badge.running .badge-dot{background:#607090;animation:pulse 1.4s ease-in-out infinite}
.badge.failed .badge-dot{background:#805040}
.cat-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase}

/* ── TABLE ── */
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:10px 16px;font-size:9px;color:#706860;letter-spacing:.09em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.07);font-family:'DM Mono',monospace;white-space:nowrap;font-weight:500}
.data-table td{padding:12px 16px;font-size:13px;color:#a0988c;vertical-align:middle;border-bottom:1px solid rgba(255,255,255,.05)}
.data-table tr{transition:background .18s}
.data-table tr:hover td{background:rgba(255,255,255,.04)}
.data-table tr.clickable{cursor:pointer}
.mono{font-family:'DM Mono',monospace;font-size:11px;color:#706860}
.table-name{color:#e8e2d8;font-weight:500}

/* ── CARDS & PANELS ── */
.panel{border-radius:20px;overflow:hidden}
.panel-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:#f0e8dc}
.panel-sub{font-size:11px;color:#606058}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.health-card{border-radius:16px;padding:14px 16px;background:rgba(255,255,255,.03)}
.progress-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .8s ease}

/* ── BUTTONS ── */
.btn-primary{padding:10px 20px;background:linear-gradient(135deg,#6a5a48,#4a3a28);color:#e0d8cc;border:none;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.1) inset;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{box-shadow:0 8px 26px rgba(0,0,0,.5);transform:translateY(-1px)}
.btn-ghost{padding:8px 16px;background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:12px;font-size:13px;color:#b0a898;transition:all .2s}
.btn-ghost:hover{background:rgba(255,255,255,.07)}
.btn-sm-run{padding:5px 13px;background:linear-gradient(135deg,#6a5a48,#4a3a28);border:none;color:#e0d8cc;border-radius:9px;font-size:11px;font-weight:600;box-shadow:0 3px 10px rgba(0,0,0,.4)}
.btn-sm-run:disabled{background:rgba(180,150,110,.08);color:#585048;box-shadow:none;cursor:not-allowed}
.btn-sm-ghost{padding:5px 13px;background:transparent;border:1px solid rgba(255,255,255,.07);color:#908880;border-radius:9px;font-size:11px}
.btn-sm-ghost:hover{background:rgba(255,255,255,.05)}
.btn-danger{padding:8px 18px;background:rgba(200,144,126,.1);border:1px solid rgba(200,144,126,.3);color:#d08070;border-radius:10px;font-size:12px}

/* ── FILTERS ── */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-input{background:transparent;border:none;padding:9px 14px;font-size:13px;color:#e8e2d8;width:220px}
.filter-segment{display:flex;border-radius:12px;overflow:hidden}
.filter-seg-btn{padding:8px 14px;background:transparent;border:none;font-size:12px;color:#888070;font-weight:400;transition:all .15s}
.filter-seg-btn.active{background:rgba(255,255,255,.12);color:#f0e8dc;font-weight:600}
.filter-select{background:transparent;border:none;padding:8px 13px;font-size:12px;color:#b0a898;cursor:pointer}

/* ── CHART CONTAINERS ── */
.chart-box{border-radius:20px;padding:20px 22px}
.chart-legend{display:flex;gap:12px;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#606058}
.legend-line{width:14px;height:2px;border-radius:2px;display:block}

/* ── HEATMAP ── */
.heatmap-grid{display:flex;gap:3px;overflow-x:auto}
.heatmap-labels{display:flex;flex-direction:column;gap:3px;padding-top:14px}
.heatmap-day-label{height:10px;font-size:8px;color:#585048;font-family:'DM Mono',monospace;display:flex;align-items:center}
.heatmap-cells{flex:1}
.heatmap-hours{display:flex;gap:2px;margin-bottom:3px}
.heatmap-hour-label{flex:1;font-size:7px;color:#585048;font-family:'DM Mono',monospace;text-align:center}
.heatmap-row{display:flex;gap:2px;margin-bottom:3px}
.heatmap-cell{flex:1;height:10px;border-radius:2px;cursor:default;transition:transform .1s}
.heatmap-cell:hover{transform:scale(1.4)}

/* ── DONUT CHART ── */
.donut-wrap{position:relative;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-label{font-size:14px;font-weight:700;color:#e8e2d8;font-family:'Cormorant Garamond',serif}
.donut-sub{font-size:8px;color:#706860;letter-spacing:.06em;text-transform:uppercase}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{border-radius:24px;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.8),0 2px 0 rgba(255,255,255,.06) inset;background:rgba(12,12,12,.82);backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);border:1px solid rgba(255,255,255,.1)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.08)}
.modal-title{font-size:15px;font-weight:600;color:#e8e2d8;font-family:'Cormorant Garamond',serif}
.modal-close{width:30px;height:30px;border-radius:10px;border:none;color:#888070;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:22px 24px}
.modal-footer{display:flex;justify-content:space-between;padding-top:18px;border-top:1px solid rgba(255,255,255,.07);margin-top:18px}

/* ── WIZARD STEPS ── */
.steps{display:flex;align-items:center;gap:0;margin-bottom:28px}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .3s;flex-shrink:0}
.step-circle.done{background:linear-gradient(135deg,#6a8860,#506848);color:#fff;box-shadow:0 3px 10px rgba(70,100,60,.3)}
.step-circle.active{background:linear-gradient(135deg,#9a8060,#786040);color:#fff;box-shadow:0 3px 10px rgba(100,80,40,.3)}
.step-circle.pending{background:rgba(18,18,18,.82);box-shadow:6px 6px 14px rgba(180,150,110,.18),-4px -4px 10px rgba(255,255,255,.85);color:#706860;border:1px solid rgba(255,255,255,.09)}
.step-label{font-size:9px;letter-spacing:.06em;text-transform:uppercase;margin-top:4px;white-space:nowrap;color:#707070}
.step-connector{flex:1;height:1px;background:rgba(255,255,255,.1);margin:0 8px;margin-bottom:14px;transition:background .3s}
.step-connector.done{background:#6a8860}
.step-col{display:flex;flex-direction:column;align-items:center;gap:4px}

/* ── FORM ── */
.form-label{font-size:11px;color:#807870;letter-spacing:.07em;text-transform:uppercase;display:block;margin-bottom:7px}
.form-input{width:100%;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 14px;font-size:13px;color:#e8e2d8;background:rgba(255,255,255,.05);backdrop-filter:blur(10px);transition:border .2s}
.form-input:focus{border-color:rgba(255,255,255,.2)}
.form-textarea{width:100%;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 14px;font-size:13px;color:#e8e2d8;background:rgba(255,255,255,.05);resize:vertical}
.trigger-card{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:14px;cursor:pointer;text-align:left;transition:all .2s;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);width:100%;margin-bottom:10px}
.trigger-card.selected{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.07)}
.trigger-icon-wrap{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.trigger-title{font-size:14px;font-weight:600;color:#e8e2d8;margin-bottom:2px}
.trigger-desc{font-size:12px;color:#706860}
.radio-ring{width:18px;height:18px;border-radius:50%;border:2px solid rgba(180,150,110,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border .2s}
.radio-ring.selected{border-color:#9a8060}
.radio-dot{width:8px;height:8px;border-radius:50%;background:#9a8060;display:none}
.radio-ring.selected .radio-dot{display:block}
.cat-pills{display:flex;flex-wrap:wrap;gap:7px}
.cat-pill{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .2s;border:1px solid;background:transparent;font-weight:400}
.review-card{border-radius:16px;padding:18px 20px;border:1px solid rgba(255,255,255,.08);margin-bottom:14px;background:rgba(255,255,255,.04);backdrop-filter:blur(16px)}
.review-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.review-key{font-size:12px;color:#707070}
.review-val{font-size:12px;color:#b0a898;font-family:'DM Mono',monospace}

/* ── TOAST ── */
#toast-container{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{border-radius:14px;padding:12px 18px;font-size:13px;font-weight:500;box-shadow:0 12px 40px rgba(0,0,0,.6);animation:slideIn .25s ease;max-width:320px;pointer-events:all;background:rgba(15,15,15,.88);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1)}
.toast.success{color:#80c090;border-color:rgba(139,180,139,.4)}
.toast.error{color:#d08070;border-color:rgba(200,120,110,.4)}
.toast.info{color:#b0a898}

/* ── QUICK ACTION ── */
#quick-actions{position:fixed;bottom:28px;right:28px;z-index:80}
#qa-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#5a5048,#3a3028);border:none;color:#e0d8cc;font-size:22px;box-shadow:0 8px 24px rgba(0,0,0,.6),0 2px 0 rgba(255,255,255,.08) inset;transition:all .25s;display:flex;align-items:center;justify-content:center;line-height:1}
#qa-btn.open{background:linear-gradient(135deg,#8a7a6a,#6a5a4a);transform:rotate(45deg)}
#qa-menu{display:none;position:absolute;bottom:54px;right:0;flex-direction:column;gap:8px}
#qa-menu.open{display:flex}
.qa-item{display:flex;align-items:center;gap:10px;padding:9px 16px;border-radius:14px;font-size:13px;color:#e8e2d8;font-weight:500;white-space:nowrap;cursor:pointer;animation:floatIn .2s ease both;background:rgba(255,252,248,.9);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.09);box-shadow:0 6px 24px rgba(120,90,60,.15)}
.qa-item:hover{background:rgba(255,255,255,.07)}

/* ── TOGGLE ── */
.toggle-wrap{width:40px;height:22px;border-radius:11px;cursor:pointer;position:relative;transition:all .25s;flex-shrink:0}
.toggle-wrap.off{background:rgba(255,255,255,.1);box-shadow:inset 3px 3px 6px rgba(180,150,110,.2),inset -2px -2px 5px rgba(255,255,255,.7)}
.toggle-wrap.on{background:linear-gradient(135deg,#7a6a50,#5a4a38);box-shadow:0 3px 10px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08)}
.toggle-knob{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .25s;box-shadow:0 2px 6px rgba(120,90,60,.3)}
.toggle-wrap.off .toggle-knob{left:3px}
.toggle-wrap.on .toggle-knob{left:21px}

/* ── SETTINGS ── */
.settings-section{border-radius:20px;overflow:hidden;margin-bottom:18px}
.settings-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.07);font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:#f0e8dc}
.settings-body{padding:18px 20px;display:flex;flex-direction:column;gap:16px}
.settings-row{display:flex;justify-content:space-between;align-items:center}
.settings-label{font-size:13px;color:#d0c8be}
.settings-desc{font-size:11px;color:#706860;margin-top:2px}
.neo-counter{display:flex;align-items:center;gap:10px}
.counter-btn{width:30px;height:30px;border-radius:9px;border:none;color:#908880;font-size:16px;display:flex;align-items:center;justify-content:center}
.counter-val{font-family:'DM Mono',monospace;font-size:15px;color:#e8e2d8;min-width:22px;text-align:center;font-weight:600}
.api-key-row{display:flex;gap:8px}
.api-key-display{border-radius:10px;padding:7px 12px;font-family:'DM Mono',monospace;font-size:11px;color:#505048}

/* ── INTEGRATIONS ── */
.intg-card{border-radius:20px;padding:18px 20px;transition:all .25s}
.intg-card.connected{background:rgba(255,255,255,.06);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1)}
.intg-card.disconnected{background:rgba(255,255,255,.03);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.06)}
.intg-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.intg-toggle-btn{width:100%;padding:9px;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:14px}
.intg-toggle-btn.disconnect{background:rgba(200,144,126,.08);border:1px solid rgba(200,144,126,.3);color:#d08070}
.intg-toggle-btn.connect{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#b0a898}

/* ── PROFILE ── */
.profile-hero{border-radius:24px;padding:28px 32px;display:flex;align-items:center;gap:24px}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#7a6a50,#4a3a28);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#e0d8cc;box-shadow:0 8px 24px rgba(0,0,0,.5);position:relative;flex-shrink:0}
.profile-online{position:absolute;bottom:4px;right:4px;width:16px;height:16px;border-radius:50%;background:#6a8860;border:2.5px solid rgba(20,20,20,.9);box-shadow:0 2px 6px rgba(70,100,60,.3)}
.profile-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#f0e8dc}
.profile-email{font-size:13px;color:#908880;margin-top:2px}
.profile-chips{margin-top:8px;display:flex;gap:8px}
.profile-chip{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;backdrop-filter:blur(8px)}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);align-items:center}
.info-key{font-size:12px;color:#706860}
.info-val{font-size:12px;color:#b0a898;font-family:'DM Mono',monospace}

/* ── ANALYTICS ── */
.kpi-card{border-radius:20px;padding:18px 20px;display:flex;align-items:center;gap:16px}
.horiz-bar-label{display:flex;justify-content:space-between;margin-bottom:5px}
.horiz-bar-name{font-size:12px;color:#b0a898;font-weight:500}
.horiz-bar-val{font-size:11px;color:#807870;font-family:'DM Mono',monospace}
.horiz-bar-track{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:12px}
.horiz-bar-fill{height:100%;border-radius:3px;transition:width .8s ease}

/* ── TOP AUTOS ── */
.top-auto-row{display:flex;align-items:center;gap:12px;padding:10px 0}
.top-auto-rank{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#c8a97e;flex-shrink:0;background:rgba(255,255,255,.04)}
.top-auto-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:4px}
.top-auto-fill{height:100%;border-radius:2px;transition:width .8s ease}

/* ── EXEC DETAIL ── */
.exec-error{background:rgba(200,144,126,.1);border:1px solid rgba(200,144,126,.25);border-radius:12px;padding:14px 16px}
.exec-error-label{font-size:9px;color:#c8907e;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;display:block}
.exec-error-msg{font-size:12px;color:#e09080;font-family:'DM Mono',monospace}
.webhook-box{border-radius:12px;padding:11px 14px;font-family:'DM Mono',monospace;font-size:11px;color:#c0a060;word-break:break-all;line-height:1.5}
.method-tag{padding:3px 10px;border-radius:8px;font-size:10px;color:#888070;font-family:'DM Mono',monospace}
.back-btn{background:transparent;border:none;color:#706860;font-size:12px;margin-bottom:16px;padding:4px 0;display:flex;align-items:center;gap:6px}
.detail-stat{border-radius:16px;padding:16px 18px}
.detail-stat-label{font-size:9px;color:#585048;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.detail-stat-val{font-size:22px;font-weight:700;color:#e8e2d8;font-family:'Cormorant Garamond',serif}
.config-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.config-key{font-size:12px;color:#706860}
.config-val{font-size:12px;color:#b0a898;font-family:'DM Mono',monospace}

/* ── ANIMATIONS ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(45deg)}}
.skeleton{border-radius:8px;background:linear-gradient(90deg,rgba(40,40,40,.6) 25%,rgba(60,60,60,.7) 50%,rgba(40,40,40,.6) 75%);background-size:200% 100%;animation:shimmer 1.8s infinite}
</style>
</head>

function progressBar(pct,h=4){

}
function toast(msg,type='info'){

function svgLineChart(data,h=110){
  const W=500,pt=8,pb=24,pl=4,pr=4;
  const cW=W-pl-pr,cH=h-pt-pb;
  const max=Math.max(...data.map(d=>d.total))*1.15;
  const x=i=>pl+(i/(data.length-1))*cW;
  const y=v=>pt+(1-v/max)*cH;
  const toP=vals=>vals.map((v,i)=>`${i===0?'M':'L'} ${x(i)} ${y(v)}`).join(' ');
  const sp=toP(data.map(d=>d.success));
  const fp=toP(data.map(d=>d.failed));
  const area=`${sp} L ${x(data.length-1)} ${h-pb} L ${pl} ${h-pb} Z`;
  const labels=data.filter((_,i)=>i%3===0).map(d=>{const i=data.indexOf(d);return`<text x="${x(i)}" y="${h-4}" text-anchor="middle" font-size="7.5" fill="rgba(200,190,180,0.4)" font-family="DM Mono,monospace">${d.date}</text>`;}).join('');
  const grids=[0.25,0.5,0.75].map(t=>`<line x1="${pl}" y1="${y(max*t)}" x2="${W-pr}" y2="${y(max*t)}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${h}" style="width:100%;height:${h}px" preserveAspectRatio="none">
    <defs><linearGradient id="sGrd" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d0d0d0" stop-opacity="0.15"/><stop offset="100%" stop-color="#d0d0d0" stop-opacity="0"/></linearGradient></defs>
    ${grids}<path d="${area}" fill="url(#sGrd)"/>
    <path d="${sp}" fill="none" stroke="#b0a898" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="${fp}" fill="none" stroke="#906050" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 3"/>
    ${labels}</svg>`;
}
function svgDonut(segments,size=64,thickness=10,label,sub){
  const R=(size-thickness)/2,circ=2*Math.PI*R,cx=size/2,cy=size/2;
  const total=segments.reduce((s,x)=>s+x.value,0);
  let offset=0;
  const arcs=segments.map(seg=>{
    const pct=seg.value/total,dash=pct*circ,gap=circ-dash;
    const el=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${seg.color}" stroke-width="${thickness}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset*circ}" stroke-linecap="round"/>`;
    offset+=pct;return el;
  }).join('');
  const bg=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="${thickness}"/>`;
  return `<div class="donut-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">${bg}${arcs}</svg>
    <div class="donut-center"><div class="donut-label">${label}</div>${sub?`<div class="donut-sub">${sub}</div>`:''}</div>
  </div>`;
}
function skeleton(w='100%',h=16){return `<div class="skeleton" style="width:${w};height:${h}px;border-radius:8px"></div>`;}

function renderMiniBar(data,h){
  const max=Math.max(...data.map(d=>d.total));
  const bars=data.map((d,i)=>{
    const hPct=(d.total/max)*82;
    const fPct=(d.failed/d.total)*100;
    const isLast=i===data.length-1;
    return `<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%">
      <div style="font-size:8px;color:#585048;font-family:'DM Mono',monospace;text-align:center;min-height:11px">${d.total}</div>
      <div style="width:100%;height:${hPct}%;border-radius:3px 3px 0 0;overflow:hidden;min-height:3px;background:${isLast?'linear-gradient(180deg,#7a6a50,#5a4a35)':'linear-gradient(180deg,rgba(120,105,80,.5),rgba(90,78,60,.22))'}">
        <div style="width:100%;height:${fPct}%;background:rgba(200,144,126,.4)"></div>
      </div>
      ${i%3===0?`<div style="font-size:7px;color:#585048;font-family:'DM Mono',monospace;text-align:center;margin-top:2px">${d.date}</div>`:'<div style="height:11px"></div>'}
    </div>`;
  }).join('');
  return `<div style="display:flex;align-items:flex-end;gap:3px;height:${h}px">${bars}</div>`;
}

          <button class="filter-seg-btn active" data-status="all">Todos</button>
          <button class="filter-seg-btn" data-status="active">Ativos</button>

let autoFilters={search:'',status:'all',cat:'all'};
function getFilteredAutomations(){
  return automations.filter(a=>
    a.name.toLowerCase().includes(autoFilters.search.toLowerCase())&&
    (autoFilters.status==='all'||a.status===autoFilters.status)&&
    (autoFilters.cat==='all'||a.category===autoFilters.cat)
  );
}
function bindAutomationEvents(){
  document.getElementById('btn-new-auto')?.addEventListener('click',()=>openWizard());
  document.getElementById('search-input')?.addEventListener('input',e=>{autoFilters.search=e.target.value;renderAutomations();});
  document.getElementById('cat-filter')?.addEventListener('change',e=>{autoFilters.cat=e.target.value;renderAutomations();});
  document.querySelectorAll('.filter-seg-btn').forEach(btn=>btn.addEventListener('click',e=>{
    document.querySelectorAll('.filter-seg-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');autoFilters.status=btn.dataset.status;renderAutomations();
  }));
  document.querySelectorAll('tr[data-id]').forEach(tr=>tr.addEventListener('click',()=>showDetail(tr.dataset.id)));
  document.querySelectorAll('[data-run]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();runAutomation(btn.dataset.run);}));
  document.querySelectorAll('[data-toggle]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();toggleAutomation(btn.dataset.toggle);}));
}
function runAutomation(id){
  const a=automations.find(x=>x.id===id);if(!a||a.status==='inactive')return;
  a.lastExecution=new Date().toISOString();
  toast(`▶ "${a.name}" iniciada`,'success');
  reRenderCurrent();
}
function toggleAutomation(id){
  const a=automations.find(x=>x.id===id);if(!a)return;
  a.status=a.status==='active'?'inactive':'active';
  toast(`"${a.name}" ${a.status==='active'?'ativada':'pausada'}`,a.status==='active'?'success':'info');
  reRenderCurrent();
}

// ══════════════════════════════════════════════════════════════
//  ANALYTICS
// ══════════════════════════════════════════════════════════════
function renderAnalytics(){
  const total=executions.filter(e=>e.status!=='running').length;
  const succ=executions.filter(e=>e.status==='success').length;
  const fail=executions.filter(e=>e.status==='failed').length;
  const running=executions.filter(e=>e.status==='running').length;
  const rate=Math.round(succ/Math.max(total,1)*100);

  const catStats=Object.entries(automations.reduce((acc,a)=>{acc[a.category]=(acc[a.category]||0)+a.totalExecutions;return acc;},{})).map(([n,v])=>({n,v})).sort((a,b)=>b.v-a.v);
  const maxCat=Math.max(...catStats.map(c=>c.v));
  const topAutos=[...automations].sort((a,b)=>b.totalExecutions-a.totalExecutions).slice(0,5);

  const kpis=[
    {label:'Taxa de Sucesso',val:`${rate}%`,sub:'sucesso',segs:[{value:succ,color:'#7a9c78'},{value:fail,color:'#9c6a5a'}]},
    {label:'Total Processado',val:total,sub:'exec',segs:[{value:total,color:'#8a8878'},{value:20,color:'rgba(80,75,65,.3)'}]},
    {label:'Falhas',val:fail,sub:'falhas',segs:[{value:fail||1,color:'#9c5a4a'},{value:total-fail,color:'rgba(60,40,35,.3)'}]},
    {label:'Em Execução',val:running,sub:'agora',segs:[{value:running||1,color:'#607898'},{value:20,color:'rgba(40,55,80,.3)'}]},
  ];
  const kpiCards=kpis.map(k=>`
    <div class="kpi-card glass">
      ${svgDonut(k.segs,64,10,k.val,k.sub)}
      <div>
        <div style="font-size:10px;color:#585048;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">${k.label}</div>
        <div style="font-size:22px;font-weight:700;color:#e8e2d8;font-family:'Cormorant Garamond',serif">${k.val}</div>
      </div>
    </div>`).join('');

  // Weekly bars
  const maxW=Math.max(...WEEKLY.map(d=>d.total));
  const weekBars=WEEKLY.map((d,i)=>{
    const hp=(d.total/maxW)*82;const fp=(d.failed/d.total)*100;const isL=i===6;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px">
      <div style="font-size:9px;color:#585048;font-family:'DM Mono',monospace">${d.total}</div>
      <div style="width:100%;height:${hp}%;border-radius:6px 6px 0 0;overflow:hidden;position:relative;min-height:4px;background:${isL?'linear-gradient(180deg,#7a6a50,#5a4a35)':'linear-gradient(180deg,rgba(120,105,80,.5),rgba(90,78,60,.22))'}">
        <div style="position:absolute;bottom:0;width:100%;height:${fp}%;background:rgba(200,144,126,.5)"></div>
      </div>
      <div style="font-size:9px;color:#585048;font-family:'DM Mono',monospace">${d.label}</div>
    </div>`;}).join('');

  // Heatmap
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const heatRows=HEATMAP.map((row,d)=>{
    const cells=row.map(cell=>{
      const p=cell.count/40;
      const c=p===0?'rgba(255,255,255,.04)':p<0.25?'rgba(120,105,80,.3)':p<0.5?'rgba(140,120,85,.55)':p<0.75?'rgba(120,100,65,.75)':'rgba(100,85,55,.9)';
      return `<div class="heatmap-cell" style="background:${c}" title="${days[d]} ${cell.hour}h: ${cell.count} exec."></div>`;
    }).join('');
    return `<div class="heatmap-row">${cells}</div>`;
  }).join('');
  const hourLabels=Array.from({length:24},(_,h)=>`<div class="heatmap-hour-label">${h%6===0?h+'h':''}</div>`).join('');

  // Category bars
  const catBars=catStats.map(c=>`
    <div>
      <div class="horiz-bar-label">
        <span class="horiz-bar-name">${c.n}</span>
        <span class="horiz-bar-val">${c.v.toLocaleString('pt-BR')}</span>
      </div>
      <div class="horiz-bar-track"><div class="horiz-bar-fill" style="width:${(c.v/maxCat)*100}%;background:linear-gradient(90deg,${catColors[c.n]||'#c8a97e'},${catColors[c.n]||'#c8a97e'}88)"></div></div>
    </div>`).join('');

  // Top automations
  const topRows=topAutos.map((a,i)=>`
    <div class="top-auto-row" style="border-bottom:${i<topAutos.length-1?'1px solid rgba(180,150,110,.1)':'none'}">
      <div class="top-auto-rank neo">${i+1}</div>
      <div style="flex:1">
        <div style="font-size:12px;color:#e8e2d8;font-weight:500;margin-bottom:3px">${a.name}</div>
        <div class="top-auto-bar"><div class="top-auto-fill" style="width:${(a.totalExecutions/topAutos[0].totalExecutions)*100}%;background:linear-gradient(90deg,${catColors[a.category]||'#c8a97e'},${catColors[a.category]||'#c8a97e'}88)"></div></div>
      </div>
      <span style="font-size:11px;font-family:'DM Mono',monospace;color:#706860">${a.totalExecutions.toLocaleString('pt-BR')}</span>
    </div>`).join('');

  document.getElementById('page-analytics').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:20px">
      <div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#e8e2d8">Analytics</div>
        <div style="font-size:12px;color:#706860;margin-top:2px">Visão aprofundada do desempenho</div>
      </div>
      <div class="grid4">${kpiCards}</div>
      <div class="grid2">
        <div class="chart-box glass">
          <div class="panel-title" style="margin-bottom:4px">Esta Semana</div>
          <div class="panel-sub" style="margin-bottom:18px">Execuções diárias</div>
          <div style="display:flex;align-items:flex-end;gap:6px;height:100px">${weekBars}</div>
        </div>
        <div class="chart-box glass">
          <div class="panel-title" style="margin-bottom:4px">Tendência 14 Dias</div>
          <div class="panel-sub" style="margin-bottom:16px">Sucesso vs. Falha</div>
          ${svgLineChart(CHART_DATA,100)}
        </div>
      </div>
      <div class="chart-box glass" style="border-radius:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div>
            <div class="panel-title">Mapa de Calor — Execuções por Hora</div>
            <div class="panel-sub" style="margin-top:2px">Concentração de atividade</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="display:flex;gap:3px">
              ${['rgba(255,255,255,.04)','rgba(120,105,80,.3)','rgba(140,120,85,.55)','rgba(120,100,65,.75)','rgba(100,85,55,.9)'].map(c=>`<div style="width:12px;height:12px;border-radius:2px;background:${c}"></div>`).join('')}
            </div>
            <span style="font-size:9px;color:#505048">Menos → Mais</span>
          </div>
        </div>
        <div class="heatmap-grid">
          <div class="heatmap-labels">${days.map(d=>`<div class="heatmap-day-label">${d}</div>`).join('')}</div>
          <div class="heatmap-cells">
            <div class="heatmap-hours">${hourLabels}</div>
            ${heatRows}
          </div>
        </div>
      </div>
      <div class="grid2">
        <div class="chart-box glass" style="border-radius:20px">
          <div class="panel-title" style="margin-bottom:18px">Execuções por Categoria</div>
          ${catBars}
        </div>
        <div class="chart-box glass" style="border-radius:20px">
          <div class="panel-title" style="margin-bottom:18px">Top Automações</div>
          ${topRows}
        </div>
      </div>
    </div>`;
}

    </div>`;

  document.querySelectorAll('[data-intg]').forEach(btn=>btn.addEventListener('click',()=>{
    const intg=integrations.find(i=>i.id===btn.dataset.intg);if(!intg)return;
    intg.status=intg.status==='connected'?'disconnected':'connected';
    toast(`${intg.name} ${intg.status==='connected'?'conectado':'desconectado'}`,intg.status==='connected'?'success':'info');
    renderIntegrations();
  }));
}

let retries=3;
const toggleState={email:true,slack:false};

    <div style="display:flex;flex-direction:column;max-width:620px">
      <div style="margin-bottom:18px">
        <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#e8e2d8">Configurações</div>
        <div style="font-size:12px;color:#706860;margin-top:2px">Preferências do workspace</div>
      </div>
      <div class="settings-section glass">
        <div class="settings-header">Execução</div>
        <div class="settings-body">
          <div class="settings-row">
            <div><div class="settings-label">Retentativas por Webhook</div><div class="settings-desc">Tentativas em caso de falha</div></div>
            <div class="neo-counter">
              <button class="counter-btn neo" id="retry-dec">−</button>
              <span class="counter-val" id="retry-val">${retries}</span>
              <button class="counter-btn neo" id="retry-inc">+</button>
            </div>
          </div>
        </div>
      </div>
      <div class="settings-section glass">
        <div class="settings-header">Alertas</div>
        <div class="settings-body">
          <div class="settings-row">
            <div><div class="settings-label">Alertas por E-mail</div><div class="settings-desc">Notificar quando automação falhar</div></div>
            <div class="toggle-wrap ${toggleState.email?'on':'off'}" data-toggle-key="email"><div class="toggle-knob"></div></div>
          </div>
          <div class="settings-row">
            <div><div class="settings-label">Alertas via Slack</div><div class="settings-desc">Webhook do Slack para notificações</div></div>
            <div class="toggle-wrap ${toggleState.slack?'on':'off'}" data-toggle-key="slack"><div class="toggle-knob"></div></div>
          </div>
        </div>
      </div>
      <div class="settings-section glass">
        <div class="settings-header">Segurança</div>
        <div class="settings-body">
          <div class="settings-row">
            <div><div class="settings-label">Chave de API</div><div class="settings-desc">Autenticar requests externos</div></div>
            <div class="api-key-row">
              <div class="api-key-display neo-in">sk_live_••••••••••••</div>
              <button class="btn-ghost" style="padding:7px 14px;font-size:11px">Revelar</button>
            </div>
          </div>
        </div>
      </div>
      <div class="settings-section glass">
        <div class="settings-header">Zona de Perigo</div>
        <div class="settings-body">
          <div class="settings-row">
            <div><div class="settings-label">Resetar workspace</div><div class="settings-desc">Remove automações e histórico</div></div>
            <button class="btn-danger">Resetar</button>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('retry-dec').addEventListener('click',()=>{retries=Math.max(0,retries-1);document.getElementById('retry-val').textContent=retries;});
  document.getElementById('retry-inc').addEventListener('click',()=>{retries=Math.min(10,retries+1);document.getElementById('retry-val').textContent=retries;});
  document.querySelectorAll('[data-toggle-key]').forEach(el=>el.addEventListener('click',()=>{
    const k=el.dataset.toggleKey;toggleState[k]=!toggleState[k];
    el.classList.toggle('on',toggleState[k]);el.classList.toggle('off',!toggleState[k]);
    toast(`Alertas por ${k==='email'?'E-mail':'Slack'} ${toggleState[k]?'ativados':'desativados'}`,'info');
  }));
}

// ══════════════════════════════════════════════════════════════
//  WIZARD (NEW AUTOMATION MODAL)
// ══════════════════════════════════════════════════════════════
const cats=['CRM','Notifications','Finance','Dev','Marketing','Product','Security'];
const triggers=[{id:'webhook',label:'Webhook',desc:'Dispara via HTTP request',icon:'🔗'},{id:'schedule',label:'Schedule',desc:'Executa em horário fixo',icon:'⏱'},{id:'event',label:'Event',desc:'Reage a eventos do sistema',icon:'⚡'}];

function openWizard(){wizardStep=1;wizardForm={name:'',category:'CRM',trigger:'webhook',description:''};renderWizard();document.getElementById('modal-new').classList.add('open');}

function renderWizard(){
  const labels=['Identidade','Trigger','Revisão'];
  const steps=labels.map((l,i)=>`
    <div class="step-col">
      <div class="step-circle ${wizardStep>i+1?'done':wizardStep===i+1?'active':'pending'}">${wizardStep>i+1?'✓':i+1}</div>
      <span class="step-label" style="color:${wizardStep===i+1?'#c8a97e':wizardStep>i+1?'#8fb57a':'#c4b4a4'}">${l}</span>
    </div>
    ${i<labels.length-1?`<div class="step-connector${wizardStep>i+1?' done':''}"></div>`:''}`).join('');
  document.getElementById('wizard-steps').innerHTML=steps;

  let content='';
  if(wizardStep===1){
    content=`
      <div style="display:flex;flex-direction:column;gap:18px">
        <div><label class="form-label">Nome da Automação *</label>
          <input class="form-input" id="wiz-name" value="${wizardForm.name}" placeholder="Ex: Lead Sync → CRM"></div>
        <div><label class="form-label">Categoria</label>
          <div class="cat-pills" id="cat-pills">
            ${cats.map(c=>`<button class="cat-pill${wizardForm.category===c?' selected':''}" data-cat="${c}" style="color:${catColors[c]||'#a89888'};border-color:${catColors[c]||'#a89888'}44;background:${wizardForm.category===c?(catColors[c]||'#a89888')+'22':'transparent'}">${c}</button>`).join('')}
          </div>
        </div>
        <div><label class="form-label">Descrição</label>
          <textarea class="form-textarea" id="wiz-desc" rows="3" placeholder="Descreva o que esta automação faz…">${wizardForm.description}</textarea></div>
      </div>`;
  } else if(wizardStep===2){
    content=triggers.map(t=>`
      <div class="trigger-card${wizardForm.trigger===t.id?' selected':''}" data-trigger="${t.id}">
        <div class="trigger-icon-wrap neo">${t.icon}</div>
        <div style="flex:1"><div class="trigger-title">${t.label}</div><div class="trigger-desc">${t.desc}</div></div>
        <div class="radio-ring${wizardForm.trigger===t.id?' selected':''}"><div class="radio-dot"></div></div>
      </div>`).join('');
  } else {
    content=`
      <div class="review-card">
        <div style="font-size:16px;font-weight:700;color:#e8e2d8;font-family:'Cormorant Garamond',serif;margin-bottom:6px">${wizardForm.name}</div>
        <div style="display:flex;gap:8px;margin-bottom:10px">${catTag(wizardForm.category)}
          <span style="padding:2px 8px;border-radius:20px;font-size:9px;color:#888070;border:1px solid rgba(255,255,255,.08);font-weight:600;text-transform:uppercase;letter-spacing:.07em;display:inline-block">${wizardForm.trigger}</span>
        </div>
        ${wizardForm.description?`<div style="font-size:12px;color:#908880;line-height:1.5">${wizardForm.description}</div>`:''}
      </div>
      ${[['Nome',wizardForm.name],['Categoria',wizardForm.category],['Trigger',wizardForm.trigger],['Status inicial','Ativo']].map(([k,v])=>`
        <div class="review-row"><span class="review-key">${k}</span><span class="review-val">${v}</span></div>`).join('')}`;
  }
  document.getElementById('wizard-content').innerHTML=content;

  const valid=wizardForm.name.trim().length>2;
  const nextBtn=document.getElementById('wizard-next');
  const backBtn=document.getElementById('wizard-back');

  if(wizardStep<3){
    nextBtn.textContent='Continuar →';
    nextBtn.style.opacity=wizardStep===1&&!valid?'0.5':'1';
    nextBtn.disabled=wizardStep===1&&!valid;
    nextBtn.className='btn-primary';
  } else {
    nextBtn.textContent='✓ Criar Automação';
    nextBtn.style.opacity='1';
    nextBtn.disabled=false;
    nextBtn.className='btn-primary';
    nextBtn.style.background='linear-gradient(135deg,#8fb57a,#6a9c5a)';
    nextBtn.style.boxShadow='0 6px 20px rgba(107,156,90,.35)';
  }
  backBtn.textContent=wizardStep>1?'← Voltar':'Cancelar';

  // Bind step events
  document.getElementById('wiz-name')?.addEventListener('input',e=>{
    wizardForm.name=e.target.value;
    const ok=wizardForm.name.trim().length>2;
    document.getElementById('wizard-next').style.opacity=ok?'1':'0.5';
    document.getElementById('wizard-next').disabled=!ok;
    e.target.style.borderColor=ok?'rgba(139,180,139,.5)':'rgba(180,150,110,.2)';
  });
  document.getElementById('wiz-desc')?.addEventListener('input',e=>wizardForm.description=e.target.value);
  document.querySelectorAll('[data-cat]').forEach(btn=>btn.addEventListener('click',()=>{
    wizardForm.category=btn.dataset.cat;
    document.querySelectorAll('[data-cat]').forEach(b=>{
      const c=catColors[b.dataset.cat]||'#a89888';
      const sel=b.dataset.cat===wizardForm.category;
      b.style.background=sel?c+'22':'transparent';b.style.fontWeight=sel?'600':'400';
    });
  }));
  document.querySelectorAll('[data-trigger]').forEach(card=>card.addEventListener('click',()=>{
    wizardForm.trigger=card.dataset.trigger;renderWizard();
  }));
}

function bindWizardNav(){
  document.getElementById('wizard-next').addEventListener('click',()=>{
    if(wizardStep<3){wizardStep++;renderWizard();}
    else{
      const newAuto={id:'auto_'+Date.now(),name:wizardForm.name,status:'active',lastExecution:null,totalExecutions:0,successRate:100,trigger:wizardForm.trigger,category:wizardForm.category,description:wizardForm.description||'Automação criada pelo painel.',webhookUrl:wizardForm.trigger==='webhook'?`https://hooks.autoflow.io/v1/auto_${Date.now()}/trigger`:null,createdAt:new Date().toISOString(),avgDuration:0};
      automations.unshift(newAuto);
      document.getElementById('modal-new').classList.remove('open');
      toast(`✦ "${wizardForm.name}" criada com sucesso!`,'success');
      navigate('automations');
    }
  });
  document.getElementById('wizard-back').addEventListener('click',()=>{
    if(wizardStep>1){wizardStep--;renderWizard();}
    else{document.getElementById('modal-new').classList.remove('open');}
  });
  document.getElementById('modal-close').addEventListener('click',()=>document.getElementById('modal-new').classList.remove('open'));
  document.getElementById('modal-new').addEventListener('click',e=>{if(e.target===document.getElementById('modal-new'))document.getElementById('modal-new').classList.remove('open');});
  document.getElementById('modal-exec-close').addEventListener('click',()=>document.getElementById('modal-exec').classList.remove('open'));
  document.getElementById('modal-exec').addEventListener('click',e=>{if(e.target===document.getElementById('modal-exec'))document.getElementById('modal-exec').classList.remove('open');});
}

// ══════════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════════
const PAGE_TITLES={dashboard:'Dashboard',automations:'Automações',executions:'Execuções',analytics:'Analytics',integrations:'Integrações',profile:'Perfil',settings:'Configurações',detail:''};
function navigate(page){
  currentPage=page;
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  const target=document.getElementById(`page-${page}`);
  if(target){target.style.display='block';target.style.animation='none';void target.offsetWidth;target.style.animation='pageIn .35s ease both';}
  document.querySelectorAll('.nav-item').forEach(n=>{n.classList.toggle('active',n.dataset.page===page);});
  const title=PAGE_TITLES[page]||'';
  document.getElementById('page-title').textContent=title;
  if(page==='dashboard')renderDashboard();
  else if(page==='automations')renderAutomations();
  else if(page==='executions')renderExecutions();
  else if(page==='analytics')renderAnalytics();
  else if(page==='integrations')renderIntegrations();
  else if(page==='profile')renderProfile();
  else if(page==='settings')renderSettings();
}

function reRenderCurrent(){navigate(currentPage==='detail'?'detail':currentPage);}

// ══════════════════════════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════════════════════════
function bindGlobalEvents(){
  // Sidebar nav
  document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>navigate(btn.dataset.page)));

  // Workspace dropdown
  document.getElementById('ws-btn').addEventListener('click',e=>{
    e.stopPropagation();
    const dd=document.getElementById('ws-dropdown');dd.style.display=dd.style.display==='none'?'block':'none';
    document.getElementById('notif-dropdown').style.display='none';
  });
  document.getElementById('ws-list').addEventListener('click',e=>{
    const opt=e.target.closest('[data-ws]');if(!opt)return;
    const ws=WORKSPACES.find(w=>w.id===opt.dataset.ws);if(!ws)return;
    currentWs=ws;renderTopbar();renderProfile();
    document.getElementById('ws-dropdown').style.display='none';
    toast(`Workspace: ${ws.name}`,'info');
  });

  // Notification dropdown
  document.getElementById('notif-btn').addEventListener('click',e=>{
    e.stopPropagation();
    const dd=document.getElementById('notif-dropdown');dd.style.display=dd.style.display==='none'?'block':'none';
    document.getElementById('ws-dropdown').style.display='none';
  });

  // Close dropdowns on outside click
  document.addEventListener('click',()=>{
    document.getElementById('ws-dropdown').style.display='none';
    document.getElementById('notif-dropdown').style.display='none';
  });

  // Quick actions
  document.getElementById('qa-btn').addEventListener('click',e=>{
    e.stopPropagation();
    const menu=document.getElementById('qa-menu');
    const btn=document.getElementById('qa-btn');
    menu.classList.toggle('open');btn.classList.toggle('open');
  });
  document.querySelectorAll('.qa-item').forEach(item=>item.addEventListener('click',()=>{
    const action=item.dataset.action;
    document.getElementById('qa-menu').classList.remove('open');
    document.getElementById('qa-btn').classList.remove('open');
    if(action==='new')openWizard();
    else navigate(action);
  }));
  document.addEventListener('click',e=>{
    if(!document.getElementById('quick-actions').contains(e.target)){
      document.getElementById('qa-menu').classList.remove('open');
      document.getElementById('qa-btn').classList.remove('open');
    }
  });
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
renderSidebarActivity();
renderTopbar();
bindGlobalEvents();
bindWizardNav();
navigate('dashboard');
</script>
